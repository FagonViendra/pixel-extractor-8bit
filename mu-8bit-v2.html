<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mũ Lưỡi Trai 8-Bit v2</title>
    <style>
        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .khung-trang {
            background-color: #ffffff;
            border-top-left-radius: 40px;
            padding: 60px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        canvas {
            image-rendering: pixelated;
            display: block;
        }
    </style>
</head>

<body>
    <div class="khung-trang">
        <canvas id="canvasMu"></canvas>
    </div>

    <script>
        const maMau = {
            'b': '#0d1117',
            '1': '#4a75b5',
            '2': '#2b447a',
            ' ': null
        };

        const anhPixel = [
            "       bbbbbb       ",
            "     bb111111bb     ",
            "    b1112111111b    ",
            "   b111121111111b   ",
            "   b111121111111b   ",
            "   b111121111111b   ",
            "   b111121111111b   ",
            "   b111221111111b   ",
            "   b112221111111b   ",
            "    bbb221111bbbb   ",
            "  bb  b11bbbb1111b  ",
            " b11bb111111111112b ",
            " b1111111111111112b ",
            "  b222111111111bbb  ",
            "   bbbb22222bbb     ",
            "       bbbbb        "
        ];

        const kichThuocPixel = 14;
        const canvas = document.getElementById('canvasMu');
        const ctx = canvas.getContext('2d');

        canvas.width = anhPixel[0].length * kichThuocPixel;
        canvas.height = anhPixel.length * kichThuocPixel;

        for (let y = 0; y < anhPixel.length; y++) {
            for (let x = 0; x < anhPixel[y].length; x++) {
                const kyTu = anhPixel[y][x];
                if (maMau[kyTu]) {
                    ctx.fillStyle = maMau[kyTu];
                    ctx.fillRect(x * kichThuocPixel, y * kichThuocPixel, kichThuocPixel, kichThuocPixel);
                }
            }
        }
    </script>
</body>

</html>
