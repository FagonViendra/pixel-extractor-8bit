<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Quét Pixel 8-Bit (V3 - Auto Sync)</title>
    <style>
        body {
            font-family: Consolas, monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        h1 {
            color: #569cd6;
        }

        .control-panel {
            background: #252526;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 600px;
        }

        input[type="file"],
        input[type="number"],
        input[type="range"] {
            background: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 4px;
        }

        .canvas-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        canvas {
            border: 1px dashed #555;
            image-rendering: pixelated;
        }

        textarea {
            width: 100%;
            max-width: 800px;
            height: 300px;
            background: #1e1e1e;
            color: #ce9178;
            border: 1px solid #444;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 4px;
        }

        .help-text {
            color: #888;
            font-size: 12px;
            margin-top: -10px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>

    <h1>Trình Trích Xuất Ma Trận Ảnh 8-Bit (V3 Auto Sync)</h1>

    <div class="control-panel">
        <label>1. Tải lên ảnh AI (Mũ lưỡi trai):</label>
        <input type="file" id="hinhAnhTaiLen" accept="image/*">

        <div class="slider-group">
            <div class="slider-header">
                <label>2. Tổng số cột (Resolution):</label>
                <span id="lbSoCot">32</span>
            </div>
            <input type="range" id="soCotGrid" value="32" min="8" max="128">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <label>3. Độ nhạy dọn nền (Xóa trắng mờ):</label>
                <span><span id="lbNen">70</span>%</span>
            </div>
            <input type="range" id="dungSaiNen" value="70" min="0" max="255">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <label>4. Mức độ Gom Màu (Bóp bảng màu):</label>
                <span><span id="lbGomMau">30</span> (Distance)</span>
            </div>
            <input type="range" id="dungSaiMau" value="30" min="0" max="150" step="5">
            <div class="help-text">Kéo lên cao để các màu dơ, na ná nhau (xanh nhạt, xanh mờ) gộp chung thành 1 màu duy
                nhất. Kéo về 0 để giữ nguyên màu gốc.</div>
        </div>
    </div>

    <div class="canvas-container">
        <div>
            <h3 style="margin-top:0;">Ảnh Gốc</h3>
            <canvas id="canvasGoc"></canvas>
        </div>
        <div>
            <h3 style="margin-top:0;">Ảnh Đã Số Hóa & Khử Khởi (Preview)</h3>
            <canvas id="canvasPreview"></canvas>
        </div>
    </div>

    <textarea id="ketQuaCode" placeholder="Mã JavaScript ma trận 2D tự động cập nhật..."></textarea>

    <script>
        const canvasGoc = document.getElementById('canvasGoc');
        const ctxGoc = canvasGoc.getContext('2d');
        const canvasPreview = document.getElementById('canvasPreview');
        const ctxPreview = canvasPreview.getContext('2d');
        const ketQuaCode = document.getElementById('ketQuaCode');

        // Form Controls
        const hinhAnhTaiLen = document.getElementById('hinhAnhTaiLen');
        const soCotGrid = document.getElementById('soCotGrid');
        const dungSaiNen = document.getElementById('dungSaiNen');
        const dungSaiMau = document.getElementById('dungSaiMau');

        // Labels
        const lbSoCot = document.getElementById('lbSoCot');
        const lbNen = document.getElementById('lbNen');
        const lbGomMau = document.getElementById('lbGomMau');

        let anhHienTai = new Image();

        // Gắn sự kiện auto-update
        const autoUpdate = () => {
            if (anhHienTai.src) xuLyAnh();
        };

        soCotGrid.addEventListener('input', (e) => { lbSoCot.innerText = e.target.value; autoUpdate(); });
        dungSaiNen.addEventListener('input', (e) => { lbNen.innerText = Math.round((e.target.value / 255) * 100); autoUpdate(); });
        dungSaiMau.addEventListener('input', (e) => { lbGomMau.innerText = e.target.value; autoUpdate(); });

        hinhAnhTaiLen.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (event) {
                anhHienTai.onload = function () {
                    const ratio = anhHienTai.width / anhHienTai.height;
                    canvasGoc.width = 200;
                    canvasGoc.height = 200 / ratio;
                    ctxGoc.drawImage(anhHienTai, 0, 0, canvasGoc.width, canvasGoc.height);
                    xuLyAnh(); // Lần chạy đầu tiên
                }
                anhHienTai.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        function rgbToHex(r, g, b, a) {
            if (a === 0) return 'transparent';
            return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
        }

        function khoangCachMau(r1, g1, b1, r2, g2, b2) {
            // Tính khoảng cách Euclidean màu RGB
            return Math.sqrt(Math.pow(r2 - r1, 2) + Math.pow(g2 - g1, 2) + Math.pow(b2 - b1, 2));
        }

        function laNenTrang(r, g, b, dungSai) {
            const nguong = 255 - dungSai;
            return (r > nguong && g > nguong && b > nguong);
        }

        function xuLyAnh() {
            const soCot = parseInt(soCotGrid.value);
            const saiSoNen = parseInt(dungSaiNen.value);
            const saiSoGomMau = parseInt(dungSaiMau.value); // Euclidean distance threshold

            const kichThuocO = anhHienTai.width / soCot;
            const soHang = Math.round(anhHienTai.height / kichThuocO);

            const hiddenCanvas = document.createElement('canvas');
            hiddenCanvas.width = anhHienTai.width;
            hiddenCanvas.height = anhHienTai.height;
            const hctx = hiddenCanvas.getContext('2d');
            hctx.drawImage(anhHienTai, 0, 0);

            let bangMauTrungTam = []; // Lưu các màu chủ đạo {r, g, b, hex, id}
            let kyTuMauHienTai = 97; // 'a'
            let mangTho = [];
            let minX = soCot, minY = soHang, maxX = -1, maxY = -1;

            // BƯỚC 1: LẤY MẪU VÀ LỌC NỀN
            for (let y = 0; y < soHang; y++) {
                let hangTho = [];
                for (let x = 0; x < soCot; x++) {
                    const centerX = Math.floor(x * kichThuocO + kichThuocO / 2);
                    const centerY = Math.floor(y * kichThuocO + kichThuocO / 2);
                    const pxData = hctx.getImageData(centerX, centerY, 1, 1).data;

                    let r = pxData[0], g = pxData[1], b = pxData[2], a = pxData[3];

                    if (laNenTrang(r, g, b, saiSoNen) || a < 50) {
                        a = 0; // Xóa nền / Răng cưa viền cực lợt
                    } else if (r < 60 && g < 60 && b < 60) {
                        // Ép mạnh viền đen / xám đậm về một màu chuẩn 
                        r = 20; g = 20; b = 20;
                    }

                    hangTho.push({ r, g, b, a });

                    if (a > 0) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
                mangTho.push(hangTho);
            }

            if (maxX < minX || maxY < minY) {
                ketQuaCode.value = "Ảnh đã bị dọn trắng 100%. Hãy xả bớt 'Độ nhạy dọn nền'.";
                ctxPreview.clearRect(0, 0, canvasPreview.width, canvasPreview.height);
                return;
            }

            // BƯỚC 2: TÍNH TOÁN BẢNG MÀU THÔNG MINH (COLOR QUANTIZATION ĐƠN GIẢN)
            canvasPreview.width = (maxX - minX + 1) * 10;
            canvasPreview.height = (maxY - minY + 1) * 10;
            ctxPreview.clearRect(0, 0, canvasPreview.width, canvasPreview.height);

            const maTranKetQua = [];

            for (let y = minY; y <= maxY; y++) {
                let hangChuoi = "";
                for (let x = minX; x <= maxX; x++) {
                    const px = mangTho[y][x];
                    let hexColor = rgbToHex(px.r, px.g, px.b, px.a);
                    let kyTu = ' ';

                    if (px.a > 0) {
                        let idTimThay = false;
                        let kyTuGomTuMauKhac = '';

                        // Dò xem màu này có "Gần giống" với màu nào đã lưu chưa
                        for (let mau of bangMauTrungTam) {
                            let khoangCach = khoangCachMau(px.r, px.g, px.b, mau.r, mau.g, mau.b);
                            if (khoangCach <= saiSoGomMau) {
                                idTimThay = true;
                                kyTuGomTuMauKhac = mau.id;
                                hexColor = mau.hex; // Ghi đè màu dơ bằng màu gốc sạch hơn
                                break;
                            }
                        }

                        if (!idTimThay) {
                            // Màu hoàn toàn mới, độc lập
                            kyTu = String.fromCharCode(kyTuMauHienTai);
                            bangMauTrungTam.push({
                                r: px.r, g: px.g, b: px.b, hex: hexColor, id: kyTu
                            });
                            kyTuMauHienTai++;
                        } else {
                            kyTu = kyTuGomTuMauKhac;
                        }
                    }

                    hangChuoi += kyTu;

                    if (kyTu !== ' ') {
                        ctxPreview.fillStyle = hexColor;
                        ctxPreview.fillRect((x - minX) * 10, (y - minY) * 10, 10, 10);
                    }
                }
                maTranKetQua.push(`"${hangChuoi}"`);
            }

            // BƯỚC 3: XUẤT CODE
            let codeOutput = `// 1. Bảng màu siêu siêu cấp V3 (Gom còn ${bangMauTrungTam.length} màu chủ đạo)\n`;
            codeOutput += "const maMau = {\n";
            bangMauTrungTam.forEach(mau => {
                codeOutput += `    '${mau.id}': '${mau.hex}',\n`;
            });
            codeOutput += "    ' ': null // Trong suốt\n};\n\n";

            codeOutput += "// 2. Ma trận Ảnh - Đã auto cập nhật lúc " + new Date().toLocaleTimeString() + "\n";
            codeOutput += "const anhPixel = [\n";
            codeOutput += maTranKetQua.join(",\n");
            codeOutput += "\n];";

            ketQuaCode.value = codeOutput;
        }
    </script>
</body>

</html>
