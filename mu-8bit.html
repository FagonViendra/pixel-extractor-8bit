<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mũ Lưỡi Trai 8-Bit</title>
    <style>
        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .khung-trang {
            background-color: #ffffff;
            border-top-left-radius: 40px;
            /* Bo tròn góc trên bên trái giống ảnh mẫu */
            padding: 60px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        canvas {
            image-rendering: pixelated;
            /* Giữ độ sắc nét của chuẩn 8-bit, không nhòe */
            display: block;
        }
    </style>
</head>

<body>
    <div class="khung-trang">
        <canvas id="canvasMu"></canvas>
    </div>

    <script>
        // Bảng màu 8-bit
        const maMau = {
            'b': '#0d1117', // Đen viền
            '1': '#4a75b5', // Xanh lam nhạt (phần màu chính)
            '2': '#2b447a', // Xanh lam đậm (phần đổ bóng)
            ' ': null       // Trong suốt
        };

        // Ma trận điểm ảnh (pixel) giả lập từ ảnh đính kèm
        const anhPixel = [
            "       bbbbbb        ",
            "     bb111111bb      ",
            "    b111b111111b     ",
            "   b1111b1111111b    ",
            "   b1111b11111111b   ",
            "   b1111b11111111b   ",
            "   b1111b11111111b   ",
            "   b1112b11111111b   ",
            "   b1122b11111111b   ",
            "    bbb2b1111bbbbb   ",
            " bb b11bbbbbb11111b  ",
            "b11bb11111111111112b ",
            "bb11111111111111122b ",
            " b22111111111bbbbbb  ",
            "  bb222222bbb        ",
            "    bbbbbb           "
        ];

        const kichThuocPixel = 14; // Thử nghiệm kích thước cho mỗi pixel
        const canvas = document.getElementById('canvasMu');
        const ctx = canvas.getContext('2d');

        canvas.width = anhPixel[0].length * kichThuocPixel;
        canvas.height = anhPixel.length * kichThuocPixel;

        // Quét và vẽ từng điểm ảnh
        for (let y = 0; y < anhPixel.length; y++) {
            for (let x = 0; x < anhPixel[y].length; x++) {
                const kyTu = anhPixel[y][x];
                if (maMau[kyTu]) {
                    ctx.fillStyle = maMau[kyTu];
                    ctx.fillRect(x * kichThuocPixel, y * kichThuocPixel, kichThuocPixel, kichThuocPixel);
                }
            }
        }
    </script>
</body>

</html>
