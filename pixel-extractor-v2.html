<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Quét Pixel 8-Bit (V2 - Pro)</title>
    <style>
        body {
            font-family: Consolas, monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        h1 {
            color: #569cd6;
        }

        .control-panel {
            background: #252526;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 500px;
        }

        input[type="file"],
        input[type="number"],
        input[type="range"] {
            background: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 4px;
        }

        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        button:hover {
            background: #1177bb;
        }

        .canvas-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        canvas {
            border: 1px dashed #555;
            image-rendering: pixelated;
        }

        textarea {
            width: 100%;
            max-width: 800px;
            height: 300px;
            background: #1e1e1e;
            color: #ce9178;
            border: 1px solid #444;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 4px;
        }

        .help-text {
            color: #888;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <h1>Trình Trích Xuất Ma Trận Ảnh 8-Bit (Bản V2 Làm Sạch Nền)</h1>

    <div class="control-panel">
        <label>1. Tải lên ảnh AI (Mũ lưỡi trai):</label>
        <input type="file" id="hinhAnhTaiLen" accept="image/*">

        <label>2. Tổng số cột (Resolution):</label>
        <input type="number" id="soCotGrid" value="28" min="8" max="128">

        <label>3. Độ nhạy dọn nền trắng (Dung sai màu): <span id="mucDungSai">70</span>%</label>
        <input type="range" id="dungSaiNen" value="70" min="0" max="255">
        <div class="help-text">Kéo lên cao để xóa sạch các điểm mù mờ xám xám/trắng nhạt do AI vẽ viền.</div>

        <button id="btnQuet">Quét, Cắt Bounding Box & Tạo Code</button>
    </div>

    <div class="canvas-container">
        <div>
            <h3 style="margin-top:0;">Ảnh Gốc</h3>
            <canvas id="canvasGoc"></canvas>
        </div>
        <div>
            <h3 style="margin-top:0;">Ảnh Đã Số Hóa & Khử Khởi (Preview)</h3>
            <canvas id="canvasPreview"></canvas>
        </div>
    </div>

    <textarea id="ketQuaCode" placeholder="Mã JavaScript ma trận 2D đã được tối ưu hóa..."></textarea>

    <script>
        const canvasGoc = document.getElementById('canvasGoc');
        const ctxGoc = canvasGoc.getContext('2d');
        const canvasPreview = document.getElementById('canvasPreview');
        const ctxPreview = canvasPreview.getContext('2d');
        const btnQuet = document.getElementById('btnQuet');
        const ketQuaCode = document.getElementById('ketQuaCode');
        const dungSaiNen = document.getElementById('dungSaiNen');
        const mucDungSai = document.getElementById('mucDungSai');

        let anhHienTai = new Image();

        dungSaiNen.addEventListener('input', (e) => {
            mucDungSai.innerText = Math.round((e.target.value / 255) * 100);
        });

        document.getElementById('hinhAnhTaiLen').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (event) {
                anhHienTai.onload = function () {
                    const ratio = anhHienTai.width / anhHienTai.height;
                    canvasGoc.width = 200;
                    canvasGoc.height = 200 / ratio;
                    ctxGoc.drawImage(anhHienTai, 0, 0, canvasGoc.width, canvasGoc.height);
                }
                anhHienTai.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        function rgbToHex(r, g, b, a) {
            if (a === 0) return 'transparent';
            return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
        }

        // Kiểm tra xem một màu có phải là "thứ cần vứt đi" (gần trắng) không
        function laNenTrang(r, g, b, dungSai) {
            // Ngưỡng độ sáng. Trắng tinh là 255. 
            // Nếu các kênh màu trung bình đều tiệm cận cạch trắng thì xóa
            const nguong = 255 - dungSai;
            return (r > nguong && g > nguong && b > nguong);
        }

        btnQuet.addEventListener('click', () => {
            if (!anhHienTai.src) {
                alert("Vui lòng tải ảnh lên trước!");
                return;
            }

            const soCot = parseInt(document.getElementById('soCotGrid').value);
            const saiSo = parseInt(dungSaiNen.value);

            const kichThuocO = anhHienTai.width / soCot;
            const soHang = Math.round(anhHienTai.height / kichThuocO);

            const hiddenCanvas = document.createElement('canvas');
            hiddenCanvas.width = anhHienTai.width;
            hiddenCanvas.height = anhHienTai.height;
            const hctx = hiddenCanvas.getContext('2d');
            hctx.drawImage(anhHienTai, 0, 0);

            let bangMau = {};
            let kyTuMauHienTai = 97; // 'a'
            const mauDenHex = '#000000'; // Gom viền về chuẩn đen

            // Mảng thô (2D RGBA)
            let mangTho = [];

            // Để tìm Bounding Box (bao đóng chủ thể)
            let minX = soCot, minY = soHang, maxX = -1, maxY = -1;

            for (let y = 0; y < soHang; y++) {
                let hangTho = [];
                for (let x = 0; x < soCot; x++) {
                    const centerX = Math.floor(x * kichThuocO + kichThuocO / 2);
                    const centerY = Math.floor(y * kichThuocO + kichThuocO / 2);
                    const pxData = hctx.getImageData(centerX, centerY, 1, 1).data;

                    let r = pxData[0], g = pxData[1], b = pxData[2], a = pxData[3];

                    // Lọc nền giả, viền mờ do nén ảnh
                    if (laNenTrang(r, g, b, saiSo)) {
                        a = 0; // Biến thành trong suốt
                    } else if (r < 60 && g < 60 && b < 60) {
                        // Gom các màu xỉn, đen xám viền thành màu viền đen tuyền thật sắc nét (#121212 hoặc #000000)
                        r = 20; g = 20; b = 20;
                    }

                    hangTho.push({ r, g, b, a });

                    // Cập nhật Bounding Box nếu pixel này có nội dung (không phải nền trắng)
                    if (a > 0) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
                mangTho.push(hangTho);
            }

            // Nếu ảnh toàn nền trắng
            if (maxX < minX || maxY < minY) {
                alert("Rớt đài! Bức ảnh bị quét trắng bóc, hãy giảm độ nhạy Dọn nền trắng xuống.");
                return;
            }

            // --- BƯỚC 2: CROP VÀ RÁP STRING DỰA TRÊN BOUNDING BOX ---
            canvasPreview.width = (maxX - minX + 1) * 10;
            canvasPreview.height = (maxY - minY + 1) * 10;
            ctxPreview.clearRect(0, 0, canvasPreview.width, canvasPreview.height);

            const maTranKetQua = [];

            for (let y = minY; y <= maxY; y++) {
                let hangChuoi = "";
                for (let x = minX; x <= maxX; x++) {
                    const px = mangTho[y][x];
                    let hexColor = rgbToHex(px.r, px.g, px.b, px.a);

                    let kyTu = ' ';
                    if (hexColor !== 'transparent') {
                        let timThay = false;
                        for (const k in bangMau) {
                            if (bangMau[k] === hexColor) {
                                kyTu = k;
                                timThay = true;
                                break;
                            }
                        }
                        if (!timThay) {
                            kyTu = String.fromCharCode(kyTuMauHienTai);
                            bangMau[kyTu] = hexColor;
                            kyTuMauHienTai++;
                        }
                    }
                    hangChuoi += kyTu;

                    // Vẽ preview crop
                    if (kyTu !== ' ') {
                        ctxPreview.fillStyle = hexColor;
                        ctxPreview.fillRect((x - minX) * 10, (y - minY) * 10, 10, 10);
                    }
                }
                maTranKetQua.push(`"${hangChuoi}"`);
            }

            // Xuất code
            let codeOutput = "// 1. Bảng mã màu siêu cấp V2 (Đã khử nhiễu)\n";
            codeOutput += "const maMau = {\n";
            for (const [kyTu, mauHex] of Object.entries(bangMau)) {
                codeOutput += `    '${kyTu}': '${mauHex}',\n`;
            }
            codeOutput += "    ' ': null // Trong suốt\n};\n\n";

            codeOutput += "// 2. Ma trận Ảnh - Đã cắt gọt (Bounding Box Crop)\n";
            codeOutput += "const anhPixel = [\n";
            codeOutput += maTranKetQua.join(",\n");
            codeOutput += "\n];";

            ketQuaCode.value = codeOutput;
        });
    </script>
</body>

</html>
