<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Quét Pixel 8-Bit</title>
    <style>
        body {
            font-family: Consolas, monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        h1 {
            color: #569cd6;
        }

        .control-panel {
            background: #252526;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 400px;
        }

        input[type="file"],
        input[type="number"] {
            background: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 4px;
        }

        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        button:hover {
            background: #1177bb;
        }

        .canvas-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        canvas {
            border: 1px dashed #555;
            image-rendering: pixelated;
        }

        textarea {
            width: 100%;
            max-width: 800px;
            height: 300px;
            background: #1e1e1e;
            color: #ce9178;
            border: 1px solid #444;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <h1>Trình Trích Xuất Ma Trận Ảnh 8-Bit (Cách 1)</h1>

    <div class="control-panel">
        <label>1. Tải lên ảnh AI (Mũ lưỡi trai):</label>
        <input type="file" id="hinhAnhTaiLen" accept="image/*">

        <label>2. Tổng số cột điểm ảnh (Độ phân giải 8-bit, ví dụ: 16 hoặc 32):</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="soCotGrid" value="16" min="8" max="128" style="width: 80px;">
            <button id="btnQuet" style="flex: 1;">Quét & Tạo Code Mảng</button>
        </div>
        <small style="color: #888;">Công cụ sẽ tự tính toán kích thước từng ô và lấy mẫu màu ở giữa ô.</small>
    </div>

    <div class="canvas-container">
        <div>
            <h3 style="margin-top:0;">Ảnh Gốc (Thu gọn)</h3>
            <canvas id="canvasGoc"></canvas>
        </div>
        <div>
            <h3 style="margin-top:0;">Ảnh Đã Số Hóa (Preview)</h3>
            <canvas id="canvasPreview"></canvas>
        </div>
    </div>

    <textarea id="ketQuaCode" placeholder="Mã JavaScript ma trận 2D và bảng màu sẽ hiện ở đây...
// Nhấn 'Quét & Tạo Code Mảng' để bắt đầu"></textarea>

    <script>
        const canvasGoc = document.getElementById('canvasGoc');
        const ctxGoc = canvasGoc.getContext('2d');
        const canvasPreview = document.getElementById('canvasPreview');
        const ctxPreview = canvasPreview.getContext('2d');
        const btnQuet = document.getElementById('btnQuet');
        const ketQuaCode = document.getElementById('ketQuaCode');

        let anhHienTai = new Image();

        // Xử lý khi chọn ảnh
        document.getElementById('hinhAnhTaiLen').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (event) {
                anhHienTai.onload = function () {
                    // Cố định kích thước nhỏ gọn cho canvas gốc để preview
                    const ratio = anhHienTai.width / anhHienTai.height;
                    canvasGoc.width = 200;
                    canvasGoc.height = 200 / ratio;
                    ctxGoc.drawImage(anhHienTai, 0, 0, canvasGoc.width, canvasGoc.height);
                }
                anhHienTai.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // Hàm chuyển RGBA sang mã màu Hex
        function rgbToHex(r, g, b, a) {
            if (a === 0) return 'transparent'; // Xử lý nếu ảnh có nền trong suốt
            return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
        }

        btnQuet.addEventListener('click', () => {
            if (!anhHienTai.src) {
                alert("Vui lòng tải ảnh lên trước!");
                return;
            }

            const soCot = parseInt(document.getElementById('soCotGrid').value);
            // Tính toán kích thước mỗi ô pixel (chữ nhật con) trên ảnh thật
            const kichThuocOSizeTreoAnh = anhHienTai.width / soCot;
            const soHang = Math.round(anhHienTai.height / kichThuocOSizeTreoAnh);

            // Vẽ ảnh thật full độ phân giải vào canvas ẩn để quét màu cho chuẩn
            const hiddenCanvas = document.createElement('canvas');
            hiddenCanvas.width = anhHienTai.width;
            hiddenCanvas.height = anhHienTai.height;
            const hctx = hiddenCanvas.getContext('2d');
            hctx.drawImage(anhHienTai, 0, 0);

            // Set kich thước cho Canvas Preview bản 8-bit
            canvasPreview.width = soCot * 10; // Vẽ to hình preview (mỗi pixel = 10px)
            canvasPreview.height = soHang * 10;
            ctxPreview.clearRect(0, 0, canvasPreview.width, canvasPreview.height);

            const maTranKetQua = [];
            const bangMau = {};
            let kyTuMauHienTai = 65; // Bắt đầu bằng chữ 'A' (Mã ASCII 65)

            // Hàm trợ giúp gán ký tự cho màu
            function layKyTuChoMau(hex) {
                if (hex === 'transparent' || hex === '#FFFFFF') return ' '; // Xem trắng nền là trong suốt (nếu cần)

                // Gom nhóm các màu hơi giống nhau? (Bỏ qua tạm thời, lấy chính xác hex)
                for (const char in bangMau) {
                    if (bangMau[char] === hex) return char;
                }

                let kyTu = String.fromCharCode(kyTuMauHienTai);
                bangMau[kyTu] = hex;
                kyTuMauHienTai++;
                return kyTu;
            }

            // Quét từng ô
            for (let y = 0; y < soHang; y++) {
                let hangChuoi = "";
                for (let x = 0; x < soCot; x++) {
                    // Tọa độ CHÍNH GIỮA của ô trên ảnh gốc
                    const centerX = Math.floor(x * kichThuocOSizeTreoAnh + kichThuocOSizeTreoAnh / 2);
                    const centerY = Math.floor(y * kichThuocOSizeTreoAnh + kichThuocOSizeTreoAnh / 2);

                    // Lấy dữ liệu 1 điểm ảnh ngay giữa
                    const pxData = hctx.getImageData(centerX, centerY, 1, 1).data;
                    const hexColor = rgbToHex(pxData[0], pxData[1], pxData[2], pxData[3]);

                    const kyTu = layKyTuChoMau(hexColor);
                    hangChuoi += kyTu;

                    // Vẽ pixel đó lên preview
                    if (kyTu !== ' ') {
                        ctxPreview.fillStyle = hexColor;
                        ctxPreview.fillRect(x * 10, y * 10, 10, 10);
                    }
                }
                maTranKetQua.push(`"${hangChuoi}"`);
            }

            // Xuất mã JavaScript
            let codeOutput = "// 1. Bảng mã màu trích xuất tự động\n";
            codeOutput += "const maMau = {\n";
            for (const [kyTu, mauHex] of Object.entries(bangMau)) {
                codeOutput += `    '${kyTu}': '${mauHex}',\n`;
            }
            codeOutput += "    ' ': null // Trong suốt\n};\n\n";

            codeOutput += "// 2. Ma trận Ảnh giả lập chuẩn xác\n";
            codeOutput += "const anhPixel = [\n";
            codeOutput += maTranKetQua.join(",\n");
            codeOutput += "\n];";

            ketQuaCode.value = codeOutput;
        });
    </script>
</body>

</html>
